version: '3.8'

services:
  # PostgreSQL Database
  bizpos-db:
    image: postgres:17-alpine
    container_name: tiko-bizpos-db
    restart: always
    environment:
      POSTGRES_USER: tikovia
      POSTGRES_PASSWORD: tikovia_secure_2026
      POSTGRES_DB: bizpos
    volumes:
      - bizpos_pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tikovia -d bizpos"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  bizpos-api:
    build: .
    container_name: tiko-bizpos-api
    restart: always
    ports:
      - "4001:4001"
    environment:
      DATABASE_URL: "postgresql://tikovia:tikovia_secure_2026@bizpos-db:5432/bizpos?schema=public"
      JWT_SECRET: "tiko-bizpos-jwt-secret-key-2026-change-me"
      JWT_EXPIRES_IN: "7d"
      PORT: "4001"
      NODE_ENV: "production"
      CORS_ORIGIN: "https://bizpos.tikovia.vn,http://localhost:5173"
    depends_on:
      bizpos-db:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tiko-bizpos-api.rule=Host(`api.tikovia.vn`)"
      - "traefik.http.services.tiko-bizpos-api.loadbalancer.server.port=4001"
    networks:
      - coolify
      - default

volumes:
  bizpos_pgdata:

networks:
  coolify:
    external: true
